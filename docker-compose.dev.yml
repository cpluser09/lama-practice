# Development configuration with hot reload
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  lama-service:
    volumes:
      - ./launch-cpu-service_docker.py:/app/launch-cpu-service_docker.py          # 热加载服务代码
      - ./templates:/app/templates                      # 热加载模板
      - ./static:/app/static                            # 热加载静态文件
    environment:
      - FLASK_DEBUG=1                                   # 启用调试模式
      - FLASK_APP=launch-cpu-service_docker.py
    command: ["python", "-u", "launch-cpu-service_docker.py"]        # 无缓冲输出
